<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快樂斑馬藥局 - 叫號系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #bda688;
            font-family: "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none; 
            padding: 10px;
            box-sizing: border-box;
        }

        .app-container {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: clamp(15px, 3vw, 40px);
            align-items: center;
            justify-items: center;
            width: 100%;
            max-width: 1000px;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .grid-minus { grid-column: 1; grid-row: 1; }
        .grid-card { grid-column: 2; grid-row: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .grid-plus { grid-column: 3; grid-row: 1; }

        .main-card {
            width: 100%;
            max-width: 600px;
            background-color: #3e2723;
            border-radius: clamp(20px, 4vw, 40px);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
        }

        .header-area {
            background-color: #e5f1e1;
            padding: clamp(15px, 3vh, 25px) 0;
            color: #386641;
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 900;
            letter-spacing: 4px;
            border-bottom: 2px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(15px, 3vw, 25px);
        }

        .header-logo {
            height: clamp(65px, 10vw, 110px);
            width: auto;
            object-fit: contain;
            background-color: transparent;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
            cursor: pointer; 
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .header-logo:hover {
            transform: scale(1.1) rotate(-5deg);
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
        }
        .header-logo:active { transform: scale(0.95); }

        .mute-btn {
            position: fixed;
            top: clamp(15px, 4vh, 30px);
            right: clamp(15px, 4vw, 30px);
            background-color: #3e2723;
            color: #d7ccc8;
            width: clamp(40px, 10vw, 60px);
            height: clamp(40px, 10vw, 60px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(18px, 4vw, 24px);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
            z-index: 999;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .mute-btn.is-muted { color: #e57373; }

        .number-container {
            height: clamp(150px, 35vh, 260px);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .number-area {
            color: white;
            font-size: clamp(120px, 20vw, 200px);
            font-family: 'Inter', 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 600; 
            letter-spacing: -1px;
            line-height: 1;
            text-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-variant-numeric: tabular-nums;
        }

        .slide-up-in { animation: slideUpIn 0.4s ease-out forwards; }
        @keyframes slideUpIn {
            0% { transform: translateY(100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .calling-glow { animation: callingGlow 1.5s ease-in-out infinite alternate; }
        @keyframes callingGlow {
            0% { transform: scale(1); text-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
            100% { transform: scale(1.05); text-shadow: 0 0 40px rgba(212, 175, 55, 0.8), 0 0 80px rgba(212, 175, 55, 0.4); color: #fffde7; }
        }

        .footer-area {
            background-color: #d7ccc8;
            padding: clamp(10px, 2vh, 15px) clamp(5px, 2vw, 15px);
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: bold;
            color: #333;
            border-top: 2px solid rgba(0,0,0,0.1);
        }

        .btn-side {
            width: clamp(80px, 12vw, 140px);
            height: clamp(200px, 45vh, 400px);
            background-color: #3e2723;
            border-radius: clamp(20px, 4vw, 40px);
            color: white;
            font-size: clamp(50px, 8vw, 80px); 
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
            -webkit-tap-highlight-color: transparent;
            position: relative;
            overflow: hidden;
        }

        .btn-side:active { transform: translateY(5px) scale(0.95); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-minus { border-bottom: clamp(6px, 1.5vh, 12px) solid #e57373; }
        .btn-plus { border-bottom: clamp(6px, 1.5vh, 12px) solid #81c784; }

        .highlight-orange { color: #f4511e; }
        .highlight-green { color: #2e7d32; }

        @media (orientation: portrait) {
            .app-container { grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; }
            .grid-card { grid-column: 1 / 3; grid-row: 1; }
            .grid-minus { grid-column: 1; grid-row: 2; }
            .grid-plus { grid-column: 2; grid-row: 2; }
            .btn-side { width: 100%; height: clamp(80px, 12vh, 120px); border-radius: 20px; font-size: clamp(40px, 10vw, 60px); border-bottom-width: 8px; }
            .header-area { font-size: clamp(26px, 7vw, 40px); padding: 15px 10px; gap: 12px; }
            .header-logo { height: clamp(80px, 18vw, 120px); }
            .mute-btn { top: 15px; right: 15px; width: 50px; height: 50px; font-size: 20px; }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .app-container { transform: translateY(-8vh); }
            .header-area { font-size: clamp(24px, 7vh, 36px); padding: 8px 0; gap: 15px; }
            .number-container { height: clamp(90px, 40vh, 140px); }
            .number-area { font-size: clamp(80px, 40vh, 120px); }
            .footer-area { font-size: clamp(12px, 3.5vh, 16px); padding: 6px; }
            .header-logo { height: clamp(50px, 15vh, 80px); }
            .btn-side { height: clamp(100px, 50vh, 180px); border-bottom-width: 6px; }
            .mute-btn { top: 15px; right: 25px; width: 45px; height: 45px; font-size: 18px; }
        }
        
        #connectionStatus {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            z-index: 100;
            background: rgba(0,0,0,0.2);
            padding: 4px 8px;
            border-radius: 4px;
            text-align: right;
        }
    </style>
</head>
<body>

    <button id="muteToggleBtn" class="mute-btn" onclick="toggleMute()" title="開啟/關閉語音">
        <i id="muteIcon" class="fa-solid fa-volume-high"></i>
    </button>

    <div class="app-container">
        <div class="grid-minus btn-side btn-minus" onclick="changeNumber(-1)"> - </div>
        <div class="grid-card">
            <div class="main-card">
                <div class="header-area">
                    <img src="logo.png" alt="Logo" class="header-logo" title="點擊斑馬歸零" onclick="confirmReset()" onerror="this.src='logo.jpg'; this.onerror=null;">
                    <span>目前領藥號</span>
                </div>
                <div class="number-container" onclick="speakNumber()">
                    <div id="numberDisplay" class="number-area">0</div>
                </div>
                <div class="footer-area">
                    領藥號<span class="highlight-orange">到號</span>或<span class="highlight-orange">過號</span>後，請<span class="highlight-green">依序排隊</span>領藥
                </div>
            </div>
            <div class="mt-6 text-[#7a6452] text-sm font-bold tracking-widest hidden md:block drop-shadow-sm relative group cursor-help w-full max-w-[400px]">
                <div class="opacity-70 group-hover:opacity-0 transition-opacity duration-300 absolute w-full text-center pointer-events-none">
                    <i class="fa-regular fa-keyboard mr-1"></i> 快捷鍵說明
                </div>
                <div class="opacity-0 group-hover:opacity-100 transition-opacity duration-300 text-center">
                    [→] 加一號 / [←] 減一號 / [空白鍵] 叫號 / 點擊斑馬歸零
                </div>
            </div>
        </div>
        <div class="grid-plus btn-side btn-plus" onclick="changeNumber(1)"> + </div>
    </div>
    
    <div id="connectionStatus">
        <span id="syncIdDisplay">載入中...</span><br>
        <span id="statusText">正在連線至雲端...</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 安全取得設定值
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'happy-zebra-default';

        if (!firebaseConfig) {
            document.getElementById('statusText').innerText = "未偵測到 Firebase 設定";
        } else {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);

            let currentNumber = 0;
            let isCalling = false;
            let isMuted = localStorage.getItem('happyZebraMuted') === 'true';
            let user = null;

            const display = document.getElementById('numberDisplay');
            const statusText = document.getElementById('statusText');
            const syncIdDisplay = document.getElementById('syncIdDisplay');
            
            syncIdDisplay.innerText = `同步 ID: ${appId}`;

            // 身分驗證
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) { statusText.innerText = "驗證出錯"; }
            };

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (user) {
                    statusText.innerText = "正在同步資料...";
                    startSync();
                }
            });

            initAuth();

            // 啟動雲端同步
            function startSync() {
                // 修復路徑：使用偶數層級 (artifacts/appId/public/data/queue/current)
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'queue', 'current');
                
                onSnapshot(docRef, (docSnap) => {
                    statusText.innerText = "● 雲端已連線";
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        const newNumber = data.currentNumber || 0;
                        
                        if (newNumber > currentNumber && currentNumber !== 0) {
                            currentNumber = newNumber;
                            updateUI(true);
                        } else {
                            currentNumber = newNumber;
                            updateUI(false);
                        }
                    } else {
                        setDoc(docRef, { currentNumber: 0 });
                    }
                }, (err) => {
                    statusText.innerText = "同步失敗，請重新整理";
                    console.error(err);
                });
            }

            // 操作方法
            window.changeNumber = async (delta) => {
                if (!user) return;
                const newNum = Math.max(0, currentNumber + delta);
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'queue', 'current');
                try {
                    await updateDoc(docRef, { currentNumber: newNum });
                } catch (e) {
                    await setDoc(docRef, { currentNumber: newNum });
                }
            };

            window.confirmReset = async () => {
                if (currentNumber === 0) return; 
                if (confirm("確定要歸零嗎？")) {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'queue', 'current');
                    await updateDoc(docRef, { currentNumber: 0 });
                }
            };

            window.toggleMute = () => {
                isMuted = !isMuted;
                localStorage.setItem('happyZebraMuted', isMuted);
                updateMuteIcon();
            };

            function updateMuteIcon() {
                const icon = document.getElementById('muteIcon');
                const btn = document.getElementById('muteToggleBtn');
                if (isMuted) {
                    icon.className = 'fa-solid fa-volume-xmark';
                    btn.classList.add('is-muted');
                } else {
                    icon.className = 'fa-solid fa-volume-high';
                    btn.classList.remove('is-muted');
                }
            }

            function updateUI(shouldSpeak) {
                display.classList.remove('slide-up-in');
                void display.offsetWidth; 
                display.innerText = currentNumber;
                display.classList.add('slide-up-in');
                if (shouldSpeak) speakNumber();
            }

            window.speakNumber = () => {
                if (isCalling) return;
                isCalling = true;
                display.classList.add('calling-glow');
                if (isMuted || !('speechSynthesis' in window)) {
                    setTimeout(() => { display.classList.remove('calling-glow'); isCalling = false; }, 1500);
                    return;
                }
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(`請 ${currentNumber} 號到櫃檯領藥`);
                msg.lang = 'zh-TW';
                msg.rate = 0.95;
                msg.onend = () => { setTimeout(() => { display.classList.remove('calling-glow'); isCalling = false; }, 800); };
                window.speechSynthesis.speak(msg);
            };

            updateMuteIcon();

            document.addEventListener('keydown', (e) => {
                if (e.repeat) return;
                switch(e.key) {
                    case 'ArrowRight': case '+': window.changeNumber(1); break;
                    case 'ArrowLeft': case '-': window.changeNumber(-1); break;
                    case ' ': case 'Enter': e.preventDefault(); window.speakNumber(); break;
                    case 'Backspace': case 'Delete': window.confirmReset(); break;
                }
            });
        }
    </script>
</body>
</html>
